<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>

<body style="font-family: Arial; background: linear-gradient(to right, #dbeafe, #fce7f3); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

<div style="background: white; padding: 30px; border-radius: 15px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;">

    <h2 style="margin-bottom: 20px;">Create Account 💫</h2>

    <form action="insert.php" method="POST">

        <input type="text" name="first_name" placeholder="First Name"
        style="width: 90%; padding: 10px; margin: 8px; border-radius: 8px; border: 1px solid #ccc;"><br>

        <input type="text" name="last_name" placeholder="Last Name"
        style="width: 90%; padding: 10px; margin: 8px; border-radius: 8px; border: 1px solid #ccc;"><br>

        <input type="email" name="email" placeholder="Email"
        style="width: 90%; padding: 10px; margin: 8px; border-radius: 8px; border: 1px solid #ccc;"><br>

        <input type="password" name="password" placeholder="Password"
        style="width: 90%; padding: 10px; margin: 8px; border-radius: 8px; border: 1px solid #ccc;"><br>

        <input type="submit" value="Register"
        style="width: 95%; padding: 10px; margin-top: 10px; border: none; border-radius: 8px; background: #60a5fa; color: white; font-weight: bold; cursor: pointer;">

    </form>

</div>

</body>
